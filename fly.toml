# fly.toml app configuration file generated for bot-restaurante on 2026-06-06T09:31:49-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bot-restaurante'
primary_region = 'gru'

[build]

[env]
  PORT = '3000'

# App stateless — nada em disco (dados no Supabase, sessões em wa_auth, imagens
# no Storage). Sem volume: mais barato e sem prender a máquina a uma região.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'   # bot precisa ficar sempre ligado (WebSocket Baileys)
  auto_start_machines = true
  min_machines_running = 1

  # Auto-cura: o Fly cutuca /health (vivacidade). Se travar "vivo" (event loop
  # preso) e parar de responder, a máquina é reciclada → boot → restore-no-boot
  # religa os bots. grace_period cobre o boot (restore roda ~10s após subir).
  [[http_service.checks]]
    grace_period = '30s'
    interval = '15s'
    timeout = '5s'
    method = 'get'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
