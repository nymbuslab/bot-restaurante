# fly.toml app configuration file generated for bot-restaurante on 2026-06-06T09:31:49-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bot-restaurante'
primary_region = 'gru'

[build]

[env]
  PORT = '3000'

# App stateless — nada em disco (dados no Supabase, sessões em wa_auth, imagens
# no Storage). Sem volume: mais barato e sem prender a máquina a uma região.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'   # bot precisa ficar sempre ligado (WebSocket Baileys)
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
