<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ativar teste grátis — Nymbus Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="tela-auth">
  <div class="co-wrap">
    <div class="co-card">
      <div class="co-marca">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h1"/>
          <path d="M21 15v7"/>
        </svg>
        <span class="co-marca-nome">Nymbus Lab</span>
      </div>

      <h1 class="co-titulo">Ative seu teste grátis</h1>
      <p class="sub co-sub">7 dias grátis. Você só é cobrado a partir do 8º dia — e pode cancelar antes sem nenhum custo.</p>

      <div class="co-plano">
        <div class="co-plano-linha">
          <span class="co-plano-nome">Plano Nymbus Lab</span>
          <span class="co-plano-preco">R$ 79,00<span class="co-plano-ciclo">/mês</span></span>
        </div>
        <div class="co-plano-linha co-plano-trial">
          <span>7 dias grátis</span>
          <span class="co-plano-hoje">R$ 0,00 hoje</span>
        </div>
      </div>

      <form id="co-form">
        <div id="payment-element" class="co-payment"><!-- Stripe injeta o Payment Element aqui --></div>
        <p id="co-erro" class="erro co-erro"></p>
        <button id="co-btn" class="auth-btn" type="submit" disabled>Carregando…</button>
      </form>

      <p class="co-seguro">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Pagamento seguro processado pelo Stripe. O cartão é cobrado só após os 7 dias.
      </p>
      <a href="admin.html" class="co-voltar">Voltar ao painel</a>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    const token = sessionStorage.getItem("token");
    if (!token) { location.href = "login.html"; }

    const form = document.getElementById("co-form");
    const btn  = document.getElementById("co-btn");
    const erro = document.getElementById("co-erro");
    const LABEL_BTN = "Iniciar teste grátis de 7 dias";
    let stripe, elements;

    function falhar(msg) {
      erro.textContent = msg || "Algo deu errado. Tente novamente.";
      btn.disabled = false;
      btn.textContent = LABEL_BTN;
    }

    async function init() {
      try {
        const r = await fetch("/api/assinatura/setup-intent", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        });
        if (r.status === 401) { location.href = "login.html"; return; }
        if (!r.ok) {
          const d = await r.json().catch(() => ({}));
          erro.textContent = d.erro || "Não foi possível iniciar o checkout.";
          return;
        }
        const { clientSecret, publishableKey } = await r.json();
        stripe = Stripe(publishableKey);

        // Appearance API — tema escuro com a identidade Nymbus.
        const appearance = {
          theme: "night",
          variables: {
            colorPrimary: "#6344BC",
            colorBackground: "#222533",
            colorText: "#F0F2FA",
            colorTextSecondary: "#8B92B3",
            colorDanger: "#EF4444",
            fontFamily: "'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif",
            borderRadius: "10px",
            spacingUnit: "4px",
          },
        };
        elements = stripe.elements({ clientSecret, appearance });
        const paymentElement = elements.create("payment", { layout: "tabs" });
        paymentElement.mount("#payment-element");
        paymentElement.on("ready", () => {
          btn.disabled = false;
          btn.textContent = LABEL_BTN;
        });
      } catch (e) {
        erro.textContent = "Erro ao conectar ao servidor.";
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!stripe || !elements) return;
      erro.textContent = "";
      btn.disabled = true;
      btn.textContent = "Processando…";

      const { error, setupIntent } = await stripe.confirmSetup({
        elements,
        confirmParams: { return_url: window.location.origin + "/admin.html?assinatura=ok" },
        redirect: "if_required",
      });

      if (error) { falhar(error.message); return; }
      if (!setupIntent || setupIntent.status !== "succeeded") {
        falhar("Não foi possível confirmar o cartão. Tente novamente.");
        return;
      }

      // Cartão salvo → cria a assinatura (trial 7d) no backend.
      try {
        const r = await fetch("/api/assinatura/confirmar", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
          body: JSON.stringify({ setupIntentId: setupIntent.id }),
        });
        if (!r.ok) {
          const d = await r.json().catch(() => ({}));
          falhar(d.erro || "Falha ao ativar a assinatura.");
          return;
        }
        location.href = "admin.html?assinatura=ok";
      } catch (e2) {
        falhar("Erro ao ativar a assinatura.");
      }
    });

    init();
  </script>
</body>
</html>
