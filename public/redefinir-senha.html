<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redefinir senha · Nymbus Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="tela-auth">
  <div class="auth-layout">
    <div class="auth-marca">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h1"/><path d="M21 15v7"/>
        </svg>
        <span class="auth-logo-nome">Nymbus Pedidos</span>
      </div>
      <p class="auth-tagline">Defina uma nova senha e volte a gerenciar seus pedidos.</p>
    </div>

    <div class="auth-form-area">
      <div class="auth-card">
        <h1>Nova senha</h1>
        <p class="sub">Escolha uma nova senha para sua conta.</p>

        <form class="auth-card-form" id="formReset">
          <div class="auth-campo">
            <label for="senha">Nova senha</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" autofocus />
            </div>
          </div>

          <div class="auth-campo">
            <label for="senha2">Confirmar nova senha</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="senha2" placeholder="Repita a nova senha" autocomplete="new-password" />
            </div>
          </div>

          <button id="btnReset" class="auth-btn" type="submit">Redefinir senha</button>
          <p id="erro" class="erro"></p>
          <p id="ok" class="auth-aviso-ok" hidden></p>
        </form>

        <div class="auth-footer"><a href="login.html">Voltar ao login</a></div>
        <p class="auth-copy">© 2026 Nymbus Lab</p>
      </div>
    </div>
  </div>

  <script src="redefinir-senha.js"></script>
</body>
</html>
