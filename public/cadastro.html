<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Criar conta — Nymbus Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="tela-auth">
  <div class="auth-layout">

    <!-- Painel de marca -->
    <div class="auth-marca">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h1"/>
          <path d="M21 15v7"/>
        </svg>
        <span class="auth-logo-nome">Nymbus Lab</span>
      </div>
      <p class="auth-tagline">Atendimento de pedidos no WhatsApp, do cardápio à confirmação.</p>
    </div>

    <!-- Formulário -->
    <div class="auth-form-area">
      <div class="auth-card">

        <!-- Etapa 1: cadastro -->
        <div id="etapa1">
          <h1>Criar sua conta</h1>
          <p class="sub">Configure seu restaurante e comece a receber pedidos</p>

          <form class="auth-card-form" id="formCadastro" onsubmit="return false">

            <div class="auth-campo">
              <label for="nome">Nome do restaurante</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </span>
                <input type="text" id="nome" placeholder="Nome do seu restaurante" autocomplete="organization" />
              </div>
            </div>

            <div class="auth-campo">
              <label for="email">E-mail de acesso</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </span>
                <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
              </div>
            </div>

            <div class="auth-campo">
              <label for="senha">Senha</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" class="com-icone-dir" />
                <button type="button" class="input-icon-right" id="olhoSenha" aria-label="Mostrar/ocultar senha" onclick="toggleSenha('senha','olhoSenha')">
                  <svg id="olhoSenha-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <div class="auth-campo">
              <label for="senha2">Confirmar senha</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="password" id="senha2" placeholder="Repita a senha" autocomplete="new-password" class="com-icone-dir" />
                <button type="button" class="input-icon-right" id="olhoSenha2" aria-label="Mostrar/ocultar confirmação de senha" onclick="toggleSenha('senha2','olhoSenha2')">
                  <svg id="olhoSenha2-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <button id="btnCadastrar" class="auth-btn" type="submit">Criar conta e começar →</button>
            <p id="erro" class="erro"></p>
          </form>

          <div class="auth-footer">
            Já tenho uma conta. <a href="login.html">Entrar</a>
          </div>

          <p class="auth-copy">© 2026 Nymbus Lab</p>
        </div>

        <!-- Etapa 2: sucesso -->
        <div id="etapa2" style="display:none">
          <div style="text-align:center;padding:16px 0 24px">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-bottom:16px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <h2 id="msgBemVindo" style="font-size:17px;margin-bottom:8px"></h2>
            <p class="sub" style="margin-bottom:28px">Sua conta foi criada. Agora é só acessar o painel e configurar seu cardápio.</p>
          </div>
          <button id="btnIrPainel" class="auth-btn">Acessar o painel</button>
        </div>

      </div>
    </div>

  </div>

  <script>
    const btn  = document.getElementById("btnCadastrar");
    const erro = document.getElementById("erro");

    function toggleSenha(inputId, btnId) {
      const inp = document.getElementById(inputId);
      const isHidden = inp.type === "password";
      inp.type = isHidden ? "text" : "password";
      document.getElementById(btnId + "-icon").innerHTML = isHidden
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    async function cadastrar() {
      erro.textContent = "";
      const nome   = document.getElementById("nome").value.trim();
      const email  = document.getElementById("email").value.trim();
      const senha  = document.getElementById("senha").value;
      const senha2 = document.getElementById("senha2").value;

      if (!nome || !email || !senha || !senha2) { erro.textContent = "Preencha todos os campos."; return; }
      if (senha !== senha2) { erro.textContent = "As senhas não coincidem."; return; }
      if (senha.length < 6) { erro.textContent = "A senha deve ter pelo menos 6 caracteres."; return; }

      btn.disabled = true;
      btn.textContent = "Criando conta...";

      try {
        const r = await fetch("/api/cadastro", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, email, senha }),
        });
        const data = await r.json();
        if (!r.ok) { erro.textContent = data.erro || "Erro ao criar conta."; btn.disabled = false; btn.textContent = "Criar conta e começar →"; return; }

        // Login automático
        const lr = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha }),
        });
        const ld = await lr.json();
        if (lr.ok) {
          sessionStorage.setItem("token", ld.token);
          sessionStorage.setItem("slug", ld.slug);
          sessionStorage.setItem("empresaNome", ld.nome);
        }

        document.getElementById("etapa1").style.display = "none";
        document.getElementById("msgBemVindo").textContent = `Bem-vindo(a), ${data.nome}!`;
        document.getElementById("etapa2").style.display = "";

      } catch (e) {
        erro.textContent = "Erro ao conectar ao servidor.";
        btn.disabled = false;
        btn.textContent = "Criar conta e começar →";
      }
    }

    btn.addEventListener("click", cadastrar);
    document.getElementById("formCadastro").addEventListener("submit", cadastrar);

    document.getElementById("btnIrPainel").addEventListener("click", () => {
      location.href = "admin.html";
    });
  </script>
</body>
</html>
