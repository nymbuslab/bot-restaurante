<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar — Nymbus Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="tela-auth">
  <div class="auth-layout">

    <!-- Painel de marca -->
    <div class="auth-marca">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h1"/>
          <path d="M21 15v7"/>
        </svg>
        <span class="auth-logo-nome">Nymbus Lab</span>
      </div>
      <p class="auth-tagline">Atendimento de pedidos no WhatsApp, do cardápio à confirmação.</p>
    </div>

    <!-- Formulário -->
    <div class="auth-form-area">
      <div class="auth-card">
        <h1>Boas-vindas</h1>
        <p class="sub">Entre para gerenciar o cardápio e o atendimento</p>

        <form class="auth-card-form" id="formLogin" onsubmit="return false">

          <div class="auth-campo">
            <label for="email">E-mail</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" autofocus />
            </div>
          </div>

          <div class="auth-campo">
            <label for="senha">Senha</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" class="com-icone-dir" />
              <button type="button" class="input-icon-right" id="olhoSenha" aria-label="Mostrar/ocultar senha" onclick="toggleSenha('senha','olhoSenha')">
                <svg id="olhoSenha-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- TODO: recuperação de senha — não implementada -->

          <button id="btnEntrar" class="auth-btn" type="submit">Entrar</button>
          <p id="erro" class="erro"></p>
        </form>

        <div class="auth-footer">
          Ainda não tem conta? <a href="cadastro.html">Criar conta de restaurante</a>
        </div>

        <p class="auth-copy">© 2026 Nymbus Lab</p>
      </div>
    </div>

  </div>

  <script>
    const btn  = document.getElementById("btnEntrar");
    const erro = document.getElementById("erro");

    function toggleSenha(inputId, btnId) {
      const inp = document.getElementById(inputId);
      const isHidden = inp.type === "password";
      inp.type = isHidden ? "text" : "password";
      document.getElementById(btnId + "-icon").innerHTML = isHidden
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    async function entrar() {
      erro.textContent = "";
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;
      if (!email || !senha) { erro.textContent = "Preencha e-mail e senha."; return; }

      btn.disabled = true;
      btn.textContent = "Entrando...";

      function falhar(msg) {
        erro.textContent = msg || "E-mail ou senha incorretos.";
        btn.disabled = false;
        btn.textContent = "Entrar";
      }

      try {
        // 1) Tenta login de restaurante (Supabase Auth).
        const r = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha }),
        });
        if (r.ok) {
          const { token, slug, nome, onboardingConcluido } = await r.json();
          sessionStorage.setItem("token", token);
          sessionStorage.setItem("slug", slug);
          sessionStorage.setItem("empresaNome", nome);
          // Onboarding incompleto → retoma o cadastro de onde parou. Senão, painel.
          location.href = onboardingConcluido === false ? "cadastro.html" : "admin.html";
          return;
        }

        // 2) Não é restaurante → tenta a conta master (mesma tela, auth isolada).
        //    O token master vai para sessionStorage["tokenAdmin"] (chave própria,
        //    diferente do "token" do restaurante) e cai direto no painel master.
        const ra = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha }),
        });
        if (ra.ok) {
          const { token } = await ra.json();
          sessionStorage.setItem("tokenAdmin", token);
          location.href = "admin-master.html";
          return;
        }

        // 3) Ambos falharam.
        falhar();
      } catch (e) {
        falhar("Erro ao conectar ao servidor.");
      }
    }

    btn.addEventListener("click", entrar);
    document.getElementById("formLogin").addEventListener("submit", entrar);
  </script>
</body>
</html>
