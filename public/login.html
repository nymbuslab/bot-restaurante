<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar — Nymbus Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="tela-auth">
  <div class="auth-layout">

    <!-- Painel de marca -->
    <div class="auth-marca">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h1"/>
          <path d="M21 15v7"/>
        </svg>
        <span class="auth-logo-nome">Nymbus Pedidos</span>
      </div>
      <p class="auth-tagline">Atendimento de pedidos no WhatsApp, do cardápio à confirmação.</p>
    </div>

    <!-- Formulário -->
    <div class="auth-form-area">
      <div class="auth-card">
        <h1>Boas-vindas</h1>
        <p class="sub">Entre para gerenciar o cardápio e o atendimento</p>

        <form class="auth-card-form" id="formLogin">

          <div class="auth-campo">
            <label for="email">E-mail</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" autofocus />
            </div>
          </div>

          <div class="auth-campo">
            <label for="senha">Senha</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" class="com-icone-dir" />
              <button type="button" class="input-icon-right" id="olhoSenha" aria-label="Mostrar/ocultar senha">
                <svg id="olhoSenha-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="auth-linha-extra">
            <label class="auth-lembrar">
              <input type="checkbox" id="lembrar" checked />
              <span>Manter conectado</span>
            </label>
            <a href="#" id="linkEsqueci" class="auth-esqueci-link">Esqueci minha senha</a>
          </div>

          <button id="btnEntrar" class="auth-btn" type="submit">Entrar</button>
          <p id="erro" class="erro"></p>
          <p id="avisoEsqueci" class="auth-aviso-ok" hidden></p>
        </form>

        <div class="auth-footer">
          Ainda não tem conta? <a href="cadastro.html">Criar conta de restaurante</a>
        </div>

        <p class="auth-copy">© 2026 Nymbus Lab</p>
      </div>
    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
